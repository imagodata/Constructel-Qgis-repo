server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index plugins.xml;

    # -- Security headers --------------------------------------------------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    # Disable server version disclosure
    server_tokens off;

    # ============================================================
    # RESTRICTION RESEAU CONSTRUCTEL
    # Tous les sous-réseaux internes 192.168.x.x sont autorisés.
    # ============================================================
    allow 192.168.0.0/16;
    allow 10.0.0.0/8;
    allow 127.0.0.1;
    allow 172.16.0.0/12;   # Docker internal networks
    deny all;

    # Plugin repository
    location /plugin-repo/ {
        alias /data/plugin-repo/;
        autoindex off;
        types {
            application/xml xml;
            application/zip zip;
        }
    }

    # Health check
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Security: deny hidden files
    location ~ /\. {
        deny all;
    }
}

# Resource Sharing repository - port 81 (mapped to 9081 externally)
# Serves the resource repo files for QGIS Resource Sharing plugin
server {
    listen 81;
    server_name _;

    # -- Security headers --------------------------------------------------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;

    allow 192.168.0.0/16;
    allow 10.0.0.0/8;
    allow 127.0.0.1;
    allow 172.16.0.0/12;
    deny all;

    location / {
        alias /data/resource-repo/;
        autoindex off;
        types {
            text/plain ini txt;
            application/xml xml qml model3;
            application/zip zip;
            image/svg+xml svg;
            image/png png;
        }
    }

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location ~ /\. {
        deny all;
    }
}

# Resource Sharing repository - smart HTTP git (push + clone/pull) - port 82
# Exposed externally as 9082 via docker-compose port mapping.
# Wraps git-http-backend through fcgiwrap; the bare repo at
# /data/resource-repo.git is served at the URL root.
server {
    listen 82;
    server_name _;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    server_tokens off;

    allow 192.168.0.0/16;
    allow 10.0.0.0/8;
    allow 127.0.0.1;
    allow 172.16.0.0/12;
    deny all;

    # Max push size - raise if collections grow larger
    client_max_body_size 200m;

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        fastcgi_param SCRIPT_FILENAME     /usr/libexec/git-core/git-http-backend;
        fastcgi_param GIT_HTTP_EXPORT_ALL "";
        fastcgi_param GIT_PROJECT_ROOT    /data;
        fastcgi_param PATH_INFO           /resource-repo.git$uri;

        fastcgi_param QUERY_STRING        $query_string;
        fastcgi_param REQUEST_METHOD      $request_method;
        fastcgi_param CONTENT_TYPE        $content_type;
        fastcgi_param CONTENT_LENGTH      $content_length;
        fastcgi_param GATEWAY_INTERFACE   CGI/1.1;
        fastcgi_param SERVER_SOFTWARE     nginx/$nginx_version;
        fastcgi_param REMOTE_ADDR         $remote_addr;
        fastcgi_param SERVER_PROTOCOL     $server_protocol;
        fastcgi_param SERVER_PORT         $server_port;
        fastcgi_param SERVER_NAME         $server_name;

        # Stream git push/pull progress in real time
        fastcgi_buffering off;
        fastcgi_request_buffering off;

        fastcgi_pass unix:/tmp/fcgiwrap.sock;
    }

    location ~ /\. {
        deny all;
    }
}
