server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index plugins.xml;

    # ============================================================
    # RESTRICTION RESEAU CONSTRUCTEL
    # Tous les sous-réseaux internes 192.168.x.x sont autorisés.
    # ============================================================
    allow 192.168.0.0/16;
    allow 10.0.0.0/8;
    allow 127.0.0.1;
    allow 172.16.0.0/12;   # Docker internal networks
    deny all;

    # Plugin repository
    location /plugin-repo/ {
        alias /data/plugin-repo/;
        autoindex on;
        types {
            application/xml xml;
            application/zip zip;
        }
    }

    # Health check
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Security: deny hidden files
    location ~ /\. {
        deny all;
    }
}

# Resource Sharing repository - port 81 (mapped to 9081 externally)
# Serves the resource repo files for QGIS Resource Sharing plugin
server {
    listen 81;
    server_name _;

    allow 192.168.0.0/16;
    allow 10.0.0.0/8;
    allow 127.0.0.1;
    allow 172.16.0.0/12;
    deny all;

    location / {
        alias /data/resource-repo/;
        autoindex on;
        types {
            text/plain ini txt;
            application/xml xml qml model3;
            application/zip zip;
            image/svg+xml svg;
            image/png png;
        }
    }

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location ~ /\. {
        deny all;
    }
}
