# Nginx configuration for QGIS Plugin & Resource Sharing repositories - Constructel
# Copy this file to /etc/nginx/sites-available/qgis-repo and create a symlink:
#   sudo ln -s /etc/nginx/sites-available/qgis-repo /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 192.168.160.31 gis-server.constructel.lan;

    root /home/sdadmin/projects/qgis_repo;
    index plugins.xml;

    # ============================================================
    # RESTRICTION RESEAU CONSTRUCTEL
    # Seul le réseau interne 192.168.160.0/24 est autorisé.
    # Ajoutez d'autres sous-réseaux Constructel si nécessaire.
    # ============================================================
    allow 192.168.160.0/24;
    allow 127.0.0.1;
    deny all;

    # Plugin repository
    location /plugin-repo/ {
        autoindex on;
        types {
            application/xml xml;
            application/zip zip;
        }
    }

    # Security: deny hidden files
    location ~ /\. {
        deny all;
    }
}

# Resource Sharing repository - port 9081
# Serves the resource repo files for QGIS Resource Sharing plugin
server {
    listen 9081;
    server_name 192.168.160.31 gis-server.constructel.lan;

    root /home/sdadmin/projects/qgis_repo/resource-repo;
    autoindex on;

    allow 192.168.160.0/24;
    allow 127.0.0.1;
    deny all;

    location / {
        types {
            text/plain ini txt;
            application/xml xml qml model3;
            application/zip zip;
            image/svg+xml svg;
            image/png png;
        }
    }

    location ~ /\. {
        deny all;
    }
}

# Resource Sharing repository - git smart HTTP (push + clone/pull) - port 9082
# Requires: fcgiwrap (apt install fcgiwrap) and git (for git-http-backend).
# After install: sudo systemctl enable --now fcgiwrap
#
# Enables `git clone`, `git pull` AND `git push` against
# http://<host>:9082/ from the internal network only.
server {
    listen 9082;
    server_name 192.168.160.31 gis-server.constructel.lan;

    allow 192.168.160.0/24;
    allow 127.0.0.1;
    deny all;

    # Max push size - raise if collections grow larger
    client_max_body_size 200m;

    location / {
        # The URL root IS the resource-repo.git bare repository.
        fastcgi_param SCRIPT_FILENAME     /usr/lib/git-core/git-http-backend;
        fastcgi_param GIT_HTTP_EXPORT_ALL "";
        fastcgi_param GIT_PROJECT_ROOT    /home/sdadmin/projects/qgis_repo;
        fastcgi_param PATH_INFO           /resource-repo.git$uri;

        fastcgi_param QUERY_STRING        $query_string;
        fastcgi_param REQUEST_METHOD      $request_method;
        fastcgi_param CONTENT_TYPE        $content_type;
        fastcgi_param CONTENT_LENGTH      $content_length;
        fastcgi_param GATEWAY_INTERFACE   CGI/1.1;
        fastcgi_param SERVER_SOFTWARE     nginx/$nginx_version;
        fastcgi_param REMOTE_ADDR         $remote_addr;
        fastcgi_param SERVER_PROTOCOL     $server_protocol;
        fastcgi_param SERVER_PORT         $server_port;
        fastcgi_param SERVER_NAME         $server_name;
        fastcgi_param HTTPS               $https if_not_empty;

        # Stream git push progress in real time
        fastcgi_buffering off;
        fastcgi_request_buffering off;

        fastcgi_pass unix:/var/run/fcgiwrap.socket;
    }

    location ~ /\. {
        deny all;
    }
}
